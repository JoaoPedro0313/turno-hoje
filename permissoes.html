<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PERMISSÕES — OBRAS BA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:#f0f4f5;color:#2d3748;padding-top:92px;padding-bottom:60px;}
.top-bar{background:linear-gradient(90deg,#0a4a4d 0%,#0d7377 40%,#0f8a82 70%,#0d7377 100%);position:fixed;top:0;left:0;right:0;z-index:91;height:52px;border-bottom:3px solid #ff6b35;box-shadow:0 2px 16px rgba(0,0,0,0.25);}
.top-bar-inner{display:flex;align-items:center;justify-content:space-between;height:100%;padding:0 18px;gap:12px;}
.top-bar-left{display:flex;align-items:center;gap:11px;flex-shrink:0;}
.tb-ic{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,0.15);display:grid;place-items:center;font-size:1.05rem;}
.top-bar-name{font-size:1.05rem;font-weight:900;color:#fff;letter-spacing:1px;text-shadow:0 1px 4px rgba(0,0,0,0.3);}
.top-bar-sep{color:rgba(255,255,255,0.35);}
.top-bar-title{font-size:0.68rem;font-weight:800;color:rgba(255,255,255,0.7);letter-spacing:2px;text-transform:uppercase;}
.top-bar-clock{font-size:0.78rem;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:1px;font-variant-numeric:tabular-nums;}
.page-nav{display:flex;background:#0d7377;position:fixed;top:52px;left:0;right:0;z-index:1099;overflow-x:auto;scrollbar-width:none;}
.page-nav::-webkit-scrollbar{display:none}
.page-nav-btn{flex:1;min-width:80px;padding:0 10px;height:40px;border:none;background:transparent;font-family:'Barlow',sans-serif;font-size:0.65rem;font-weight:800;color:rgba(255,255,255,0.6);cursor:pointer;letter-spacing:0.6px;text-transform:uppercase;border-top:2px solid transparent;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;text-decoration:none}
.page-nav-btn:hover{color:rgba(255,255,255,0.95);background:rgba(255,255,255,0.08)}
.page-nav-btn.active-perm{color:#fff;background:rgba(0,0,0,0.2);border-top:2px solid #fff}
.wrap{max-width:1080px;margin:18px auto;padding:0 14px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px;}
.kpi{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 2px 12px rgba(0,0,0,0.07);border-top:3px solid #0d7377;}
.kpi.green{border-top-color:#14a085;}.kpi.blue{border-top-color:#2b6cb0;}.kpi.orange{border-top-color:#d97706;}
.kpi .v{font-size:2rem;font-weight:800;color:#2d3748;line-height:1;}
.kpi .l{font-size:0.65rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1.5px;margin-top:5px;}
.panel{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:24px;}
.cols{display:grid;grid-template-columns:230px 1fr;gap:18px;align-items:start;margin-bottom:24px;}
.side{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.07);overflow:hidden;position:sticky;top:108px;}
.side-h{background:#f0fafa;border-bottom:1px solid #c0e8e5;padding:13px 16px;font-size:0.78rem;font-weight:800;color:#0d7377;letter-spacing:0.5px;}
.side-b{padding:14px 16px;}
.fg{margin-bottom:15px;}
.fg>label{display:block;font-size:0.62rem;font-weight:800;color:#9aa7ad;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;}
.vlist{display:flex;flex-direction:column;gap:6px;}
.vlist .fbtn{width:100%;text-align:left;}
.side .search{width:100%;margin-left:0;}
.side .exp{width:100%;padding:10px;}
.main{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
@media(max-width:840px){.cols{grid-template-columns:1fr;}.side{position:static;}}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#f0fafa;border-bottom:1px solid #c0e8e5;}
.sec-t{font-size:1rem;font-weight:800;color:#222;letter-spacing:0.5px;display:flex;align-items:center;gap:10px;}
.count{background:#0d7377;color:#fff;font-size:0.72rem;font-weight:800;padding:3px 10px;border-radius:5px;white-space:nowrap;}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:14px 20px;border-bottom:1px solid #edf0f2;background:#fafbfc;}
.fbtn{background:#fff;border:1.5px solid #e2e8f0;color:#666;padding:7px 14px;border-radius:8px;font-size:0.78rem;font-family:'Barlow',sans-serif;font-weight:800;cursor:pointer;transition:all 0.15s;}
.fbtn:hover{border-color:#14a085;color:#0d7377;}
.fbtn.active{background:#14a085;border-color:#14a085;color:#fff;}
.search{background:#fff;border:1.5px solid #e2e8f0;color:#2d3748;padding:7px 14px;border-radius:8px;font-size:0.82rem;font-family:'Barlow',sans-serif;font-weight:600;width:230px;margin-left:auto;outline:none;}
.search:focus{border-color:#14a085;}
.exp{background:#2b6cb0;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:0.78rem;font-family:'Barlow',sans-serif;font-weight:800;cursor:pointer;}
.exp:hover{background:#1a4a80;}
.twrap{overflow-x:auto;max-height:64vh;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:0.82rem;}
thead th{position:sticky;top:0;background:#f8fafc;padding:11px 14px;text-align:left;font-size:0.66rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#888;white-space:nowrap;border-bottom:2px solid #e8ecef;z-index:1;}
thead th.c{text-align:center;}
tbody td{padding:10px 14px;border-bottom:1px solid #edf0f2;color:#2d3748;white-space:nowrap;}
tbody td.c{text-align:center;}
tbody tr:hover{background:#f9fbff;}
.nm{font-weight:700;color:#1a365d;}
.lg{color:#888;font-size:0.72rem;font-weight:700;}
.cg{color:#555;font-size:0.76rem;font-weight:600;white-space:nowrap;}
.ck{color:#14a085;font-weight:800;font-size:1rem;}
.no{color:#e2e8f0;}
.tot{font-weight:800;color:#0d7377;}
.badge7{display:inline-block;background:#d0f0ee;color:#0d7377;font-size:0.62rem;font-weight:800;padding:2px 7px;border-radius:5px;}
.badgep{display:inline-block;background:#fef3cd;color:#b97400;font-size:0.62rem;font-weight:800;padding:2px 7px;border-radius:5px;}
.pill{display:inline-block;background:#f0fafa;border:1px solid #c0e8e5;color:#0d7377;font-size:0.68rem;font-weight:700;padding:2px 8px;border-radius:12px;margin:2px 3px 2px 0;}
.bar{height:14px;background:#eef2f3;border-radius:7px;overflow:hidden;min-width:120px;display:inline-block;vertical-align:middle;}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#0d7377,#14a085);}
.empty{text-align:center;padding:40px;color:#aaa;font-weight:600;}
@media(max-width:840px){.kpis{grid-template-columns:repeat(2,1fr);}.search{width:100%;margin-left:0;}}
</style>
</head>
<body>
<div class="top-bar"><div class="top-bar-inner">
  <div class="top-bar-left">
    <div class="tb-ic">🔐</div>
    <div class="top-bar-brand"><span class="top-bar-name">Mariuá</span> <span class="top-bar-sep">·</span> <span class="top-bar-title">Permissões</span></div>
  </div>
  <div class="top-bar-clock" id="page-time"></div>
  <div style="width:60px"></div>
</div></div>
<nav class="page-nav">
  <a class="page-nav-btn" href="turno.html">📋 TURNO</a>
  <a class="page-nav-btn" href="apr.html">📊 RDO</a>
  <a class="page-nav-btn" href="comp.html">⚡ COMPARADOR</a>
  <a class="page-nav-btn" href="projeçao.html">📲 PDA</a>
  <a class="page-nav-btn" href="mapa.html">🗺️ MAPA</a>
  <a class="page-nav-btn" href="prog.html">📅 PROG. DIÁRIA</a>
  <a class="page-nav-btn active-perm" href="permissoes.html">🔐 PERMISSÕES</a>
</nav>

<div class="wrap">
  <div class="kpis" id="perm-kpis"></div>
  <div class="cols">
    <aside class="side">
      <div class="side-h">⚙ Visão & filtros</div>
      <div class="side-b">
        <div class="fg"><label>Visão</label>
          <div class="vlist">
            <button class="fbtn active" id="v-matriz" onclick="permSetView('matriz')">Matriz</button>
            <button class="fbtn" id="v-usuario" onclick="permSetView('usuario')">Por usuário</button>
            <button class="fbtn" id="v-tela" onclick="permSetView('tela')">Por tela</button>
          </div>
        </div>
        <div class="fg"><label>Busca</label>
          <input type="text" class="search" id="perm-search" placeholder="🔎 usuário, login ou cargo" oninput="permRender()">
        </div>
        <button class="exp" onclick="permExport()">💾 Exportar CSV</button>
      </div>
    </aside>
    <section class="main">
      <div class="sec-h">
        <div class="sec-t" id="perm-title">🔐 Telas por usuário — Programação</div>
        <span class="count" id="perm-count">—</span>
      </div>
      <div class="twrap"><table id="perm-table"><thead id="perm-thead"></thead><tbody id="perm-tbody"></tbody></table></div>
    </section>
  </div>
</div>

<script>
(function(){
'use strict';
var SUPA='https://eqxejfoibebcbtsqymji.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxeGVqZm9pYmViY2J0c3F5bWppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NjUzMTEsImV4cCI6MjA4NzQ0MTMxMX0.lwf7_EJ6UchEOpzhW3cVKztxDGy78gaQblRvgiEwWh8';
function H(){return {apikey:SKEY,Authorization:'Bearer '+SKEY};}
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
var TELAS=[], SHORT=[], USERS=[], view='matriz';
var SHORTMAP={'Painel Programação Obras':'Painel','Relatório Programação Obras':'Relatório','Reprogramação de Obras':'Reprog.','Despachar Obras Equipes':'Desp. Equipes','Retorno Programador':'Retorno','Pré-Inventário':'Pré-Inv.','Despachar Obras Civis':'Desp. Civis'};

function clock(){var d=new Date();var t=$('page-time');if(t)t.textContent=d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
clock();setInterval(clock,30000);

function load(){
  fetch(SUPA+'/rest/v1/turno_data?key=eq.permissoes_programacao&select=value',{headers:H()})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(arr){
      if(!arr||!arr[0]||!arr[0].value){$('perm-tbody').innerHTML='<tr><td class="empty">Nenhum dado de permissões no banco.</td></tr>';return;}
      var v=arr[0].value; TELAS=v.telas||[]; SHORT=TELAS.map(function(t){return SHORTMAP[t]||t;});
      USERS=String(v.data||'').split('\n').filter(Boolean).map(function(ln){
        var p=ln.split('|'); var idxs=(p[3]||'').split(',').filter(function(x){return x!=='';}).map(Number);
        return {login:p[0]||'',nome:p[1]||'',cargo:p[2]||'',set:idxs};
      });
      renderKPIs(); permRender();
    })
    .catch(function(){$('perm-tbody').innerHTML='<tr><td class="empty">Erro ao carregar do banco.</td></tr>';});
}

function renderKPIs(){
  var full=USERS.filter(function(u){return u.set.length===TELAS.length;}).length;
  var html='';
  html+='<div class="kpi blue"><div class="v">'+USERS.length+'</div><div class="l">Usuários</div></div>';
  html+='<div class="kpi"><div class="v">'+TELAS.length+'</div><div class="l">Telas</div></div>';
  html+='<div class="kpi green"><div class="v">'+full+'</div><div class="l">Com todas as '+TELAS.length+'</div></div>';
  html+='<div class="kpi orange"><div class="v">'+(USERS.length-full)+'</div><div class="l">Acesso parcial</div></div>';
  $('perm-kpis').innerHTML=html;
}

function filtered(){
  var q=($('perm-search').value||'').trim().toLowerCase();
  if(!q)return USERS;
  return USERS.filter(function(u){return u.nome.toLowerCase().indexOf(q)>=0||u.login.toLowerCase().indexOf(q)>=0||(u.cargo||'').toLowerCase().indexOf(q)>=0;});
}

window.permSetView=function(v){view=v;['matriz','usuario','tela'].forEach(function(x){$('v-'+x).className='fbtn'+(x===v?' active':'');});permRender();};

window.permRender=function(){
  if(!TELAS.length)return;
  var th=$('perm-thead'), tb=$('perm-tbody');
  var list=filtered().slice().sort(function(a,b){return a.nome.toUpperCase()<b.nome.toUpperCase()?-1:1;});
  if(view==='matriz'){
    $('perm-title').textContent='🔐 Matriz — telas por usuário';
    var h='<tr><th>Usuário</th><th>Login</th><th>Cargo</th>';
    SHORT.forEach(function(s,i){h+='<th class="c" title="'+esc(TELAS[i])+'">'+esc(s)+'</th>';});
    h+='<th class="c">Total</th></tr>'; th.innerHTML=h;
    var rows=list.map(function(u){
      var tds=''; for(var i=0;i<TELAS.length;i++){tds+='<td class="c">'+(u.set.indexOf(i)>=0?'<span class="ck">✓</span>':'<span class="no">·</span>')+'</td>';}
      return '<tr><td class="nm">'+esc(u.nome)+'</td><td class="lg">'+esc(u.login)+'</td><td class="cg">'+(u.cargo?esc(u.cargo):'<span class="no">—</span>')+'</td>'+tds+'<td class="c tot">'+u.set.length+'</td></tr>';
    }).join('');
    tb.innerHTML=rows||'<tr><td class="empty" colspan="'+(TELAS.length+4)+'">Nenhum usuário.</td></tr>';
    $('perm-count').textContent=list.length+' usuários';
  } else if(view==='usuario'){
    $('perm-title').textContent='🔐 Por usuário';
    th.innerHTML='<tr><th>Usuário</th><th>Login</th><th>Cargo</th><th class="c">Qtd</th><th>Telas</th></tr>';
    var rows=list.map(function(u){
      var tag=u.set.length===TELAS.length?'<span class="badge7">todas</span>':'<span class="badgep">'+u.set.length+'/'+TELAS.length+'</span>';
      var pills=u.set.map(function(i){return '<span class="pill">'+esc(TELAS[i])+'</span>';}).join('');
      return '<tr><td class="nm">'+esc(u.nome)+'</td><td class="lg">'+esc(u.login)+'</td><td class="cg">'+(u.cargo?esc(u.cargo):'<span class="no">—</span>')+'</td><td class="c">'+tag+'</td><td>'+pills+'</td></tr>';
    }).join('');
    tb.innerHTML=rows||'<tr><td class="empty" colspan="5">Nenhum usuário.</td></tr>';
    $('perm-count').textContent=list.length+' usuários';
  } else {
    $('perm-title').textContent='🔐 Por tela';
    th.innerHTML='<tr><th>Tela</th><th class="c">Usuários</th><th>Adesão</th></tr>';
    var counts=TELAS.map(function(_,i){return list.filter(function(u){return u.set.indexOf(i)>=0;}).length;});
    var order=TELAS.map(function(t,i){return {t:t,n:counts[i]};}).sort(function(a,b){return b.n-a.n;});
    var tot=list.length||1;
    var rows=order.map(function(o){
      var pc=Math.round(o.n/tot*100);
      return '<tr><td class="nm">'+esc(o.t)+'</td><td class="c tot">'+o.n+'</td><td><span class="bar"><i style="width:'+pc+'%"></i></span> <b>'+pc+'%</b></td></tr>';
    }).join('');
    tb.innerHTML=rows||'<tr><td class="empty" colspan="3">Sem dados.</td></tr>';
    $('perm-count').textContent=TELAS.length+' telas';
  }
};

window.permExport=function(){
  var list=filtered().slice().sort(function(a,b){return a.nome.toUpperCase()<b.nome.toUpperCase()?-1:1;});
  var sep=';', head=['Login','Usuario','Cargo'].concat(TELAS).concat(['Total']);
  var lines=[head.join(sep)];
  list.forEach(function(u){
    var row=[u.login,u.nome,u.cargo];
    for(var i=0;i<TELAS.length;i++)row.push(u.set.indexOf(i)>=0?'Sim':'Nao');
    row.push(u.set.length);
    lines.push(row.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(sep));
  });
  var blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='permissoes_programacao.csv';a.click();
};

load();
})();
</script>
</body>
</html>
