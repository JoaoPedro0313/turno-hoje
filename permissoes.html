<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TELAS X USUÁRIOS — OBRAS BA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:#f0f4f5;color:#2d3748;padding-top:92px;padding-bottom:60px;}
.top-bar{background:linear-gradient(90deg,#0a4a4d 0%,#0d7377 40%,#0f8a82 70%,#0d7377 100%);position:fixed;top:0;left:0;right:0;z-index:91;height:52px;border-bottom:3px solid #ff6b35;box-shadow:0 2px 16px rgba(0,0,0,0.25);}
.top-bar-inner{display:flex;align-items:center;justify-content:space-between;height:100%;padding:0 18px;gap:12px;}
.top-bar-left{display:flex;align-items:center;gap:11px;flex-shrink:0;}
.tb-ic{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,0.15);display:grid;place-items:center;font-size:1.05rem;}
.top-bar-name{font-size:1.05rem;font-weight:900;color:#fff;letter-spacing:1px;text-shadow:0 1px 4px rgba(0,0,0,0.3);}
.top-bar-sep{color:rgba(255,255,255,0.35);}
.top-bar-title{font-size:0.68rem;font-weight:800;color:rgba(255,255,255,0.7);letter-spacing:2px;text-transform:uppercase;}
.top-bar-clock{font-size:0.78rem;font-weight:700;color:rgba(255,255,255,0.6);letter-spacing:1px;font-variant-numeric:tabular-nums;}
.page-nav{display:flex;background:#0d7377;position:fixed;top:52px;left:0;right:0;z-index:1099;overflow-x:auto;scrollbar-width:none;}
.page-nav::-webkit-scrollbar{display:none}
.page-nav-btn{flex:1;min-width:80px;padding:0 10px;height:40px;border:none;background:transparent;font-family:'Barlow',sans-serif;font-size:0.65rem;font-weight:800;color:rgba(255,255,255,0.6);cursor:pointer;letter-spacing:0.6px;text-transform:uppercase;border-top:2px solid transparent;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;text-decoration:none}
.page-nav-btn:hover{color:rgba(255,255,255,0.95);background:rgba(255,255,255,0.08)}
.page-nav-btn.active-perm{color:#fff;background:rgba(0,0,0,0.2);border-top:2px solid #fff}
.wrap{max-width:100%;margin:18px auto;padding:0 18px;box-sizing:border-box;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px;}
.kpi{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 2px 12px rgba(0,0,0,0.07);border-top:3px solid #0d7377;}
.kpi.green{border-top-color:#14a085;}.kpi.blue{border-top-color:#2b6cb0;}.kpi.orange{border-top-color:#d97706;}
.kpi .v{font-size:2rem;font-weight:800;color:#2d3748;line-height:1;}
.kpi .l{font-size:0.65rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1.5px;margin-top:5px;}
.panel{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:24px;}
.cols{display:grid;grid-template-columns:230px 1fr;gap:18px;align-items:start;margin-bottom:24px;}
.side{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.07);overflow:hidden;position:sticky;top:108px;}
.side-h{background:#f0fafa;border-bottom:1px solid #c0e8e5;padding:13px 16px;font-size:0.78rem;font-weight:800;color:#0d7377;letter-spacing:0.5px;}
.side-b{padding:14px 16px;}
.fg{margin-bottom:15px;}
.fg>label{display:block;font-size:0.62rem;font-weight:800;color:#9aa7ad;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;}
.vlist{display:flex;flex-direction:column;gap:6px;}
.vlist .fbtn{width:100%;text-align:left;}
.side .search{width:100%;margin-left:0;}
.side .exp{width:100%;padding:10px;}
.main{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
@media(max-width:840px){.cols{grid-template-columns:1fr;}.side{position:static;}}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#f0fafa;border-bottom:1px solid #c0e8e5;}
.sec-t{font-size:1rem;font-weight:800;color:#222;letter-spacing:0.5px;display:flex;align-items:center;gap:10px;}
.count{background:#0d7377;color:#fff;font-size:0.72rem;font-weight:800;padding:3px 10px;border-radius:5px;white-space:nowrap;}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:14px 20px;border-bottom:1px solid #edf0f2;background:#fafbfc;}
.fbtn{background:#fff;border:1.5px solid #e2e8f0;color:#666;padding:7px 14px;border-radius:8px;font-size:0.78rem;font-family:'Barlow',sans-serif;font-weight:800;cursor:pointer;transition:all 0.15s;}
.fbtn:hover{border-color:#14a085;color:#0d7377;}
.fbtn.active{background:#14a085;border-color:#14a085;color:#fff;}
.search{background:#fff;border:1.5px solid #e2e8f0;color:#2d3748;padding:7px 14px;border-radius:8px;font-size:0.82rem;font-family:'Barlow',sans-serif;font-weight:600;width:230px;margin-left:auto;outline:none;}
.search:focus{border-color:#14a085;}
.exp{background:#2b6cb0;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:0.78rem;font-family:'Barlow',sans-serif;font-weight:800;cursor:pointer;}
.exp:hover{background:#1a4a80;}
.twrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.82rem;}
thead th{position:sticky;top:0;background:#f8fafc;padding:11px 14px;text-align:left;font-size:0.66rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#888;white-space:nowrap;border-bottom:2px solid #e8ecef;z-index:1;}
thead th.c{text-align:center;}
tbody td{padding:10px 14px;border-bottom:1px solid #edf0f2;color:#2d3748;white-space:nowrap;}
tbody td.c{text-align:center;}
tbody tr:hover{background:#f9fbff;}
.nm{font-weight:700;color:#1a365d;}
.lg{color:#888;font-size:0.72rem;font-weight:700;}
.cg{color:#555;font-size:0.76rem;font-weight:600;white-space:nowrap;}
.ck{color:#14a085;font-weight:800;font-size:1rem;}
.no{color:#e2e8f0;}
.tot{font-weight:800;color:#0d7377;}
.badge7{display:inline-block;background:#d0f0ee;color:#0d7377;font-size:0.62rem;font-weight:800;padding:2px 7px;border-radius:5px;}
.badgep{display:inline-block;background:#fef3cd;color:#b97400;font-size:0.62rem;font-weight:800;padding:2px 7px;border-radius:5px;}
.pill{display:inline-block;background:#f0fafa;border:1px solid #c0e8e5;color:#0d7377;font-size:0.68rem;font-weight:700;padding:2px 8px;border-radius:12px;margin:2px 3px 2px 0;}
.bar{height:14px;background:#eef2f3;border-radius:7px;overflow:hidden;min-width:120px;display:inline-block;vertical-align:middle;}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#0d7377,#14a085);}
.empty{text-align:center;padding:40px;color:#aaa;font-weight:600;}
@media(max-width:840px){.kpis{grid-template-columns:repeat(2,1fr);}.search{width:100%;margin-left:0;}}
</style>
<style id="sidemenu-css">
.page-nav{display:none !important;}
body{padding-top:60px !important;padding-left:232px;}
.sm-side{position:fixed;top:52px;left:0;bottom:0;width:232px;z-index:110;background:#fff;border-right:1px solid #e6ebee;box-shadow:2px 0 12px rgba(0,0,0,.04);display:flex;flex-direction:column;transition:width .22s ease;font-family:'Barlow',sans-serif}
.sm-top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #eef2f4;overflow:hidden}
.sm-logo{width:34px;height:34px;flex-shrink:0;object-fit:contain;display:block}
.sm-logo-tx{font-weight:800;color:#0d7377;letter-spacing:1px;font-size:1rem;white-space:nowrap;line-height:1.05}
.sm-logo-tx small{display:block;font-size:.5rem;letter-spacing:2px;color:#9aa6ab;font-weight:700}
.sm-toggle{display:flex;justify-content:center;padding:7px 0;border-bottom:1px solid #eef2f4}
.sm-toggle button{background:#f3f6f7;border:1px solid #e6ebee;color:#0d7377;width:38px;height:30px;border-radius:8px;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center}
.sm-toggle button:hover{background:#e7f0f0}
.sm-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;display:flex;flex-direction:column;gap:3px}
.sm-item{display:flex;align-items:center;gap:12px;padding:9px 11px;border-radius:10px;text-decoration:none;color:#54616a;transition:background .14s,color .14s;white-space:nowrap;cursor:pointer}
.sm-item:hover{background:#eef4f4;color:#0d7377}
.sm-ic{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem;background:#f1f5f6}
.sm-tx{font-size:.84rem;font-weight:700}
.sm-item.active{background:linear-gradient(135deg,#0d7377,#14a085);color:#fff;box-shadow:0 4px 12px rgba(13,115,119,.28)}
.sm-item.active .sm-ic{background:rgba(255,255,255,.22)}
.sm-foot{padding:9px 14px;border-top:1px solid #eef2f4;font-size:.6rem;color:#aab4b8;font-weight:700;white-space:nowrap;overflow:hidden}
body.sm-collapsed{padding-left:64px;}
body.sm-collapsed .sm-side{width:64px}
body.sm-collapsed .sm-logo-tx,body.sm-collapsed .sm-tx,body.sm-collapsed .sm-foot{display:none}
body.sm-collapsed .sm-top{justify-content:center;padding:12px 0}
body.sm-collapsed .sm-item{justify-content:center;padding:9px 0}
.bottom-bar{left:232px !important;}
body.sm-collapsed .bottom-bar{left:64px !important;}
@media (max-width:780px){
  body{padding-left:64px !important;}
  .sm-side{width:64px}
  .sm-logo-tx,.sm-tx,.sm-foot{display:none}
  .sm-top{justify-content:center;padding:12px 0}
  .sm-item{justify-content:center;padding:9px 0}
  body.sm-expanded .sm-side{width:228px;box-shadow:6px 0 24px rgba(0,0,0,.18)}
  body.sm-expanded .sm-logo-tx,body.sm-expanded .sm-tx,body.sm-expanded .sm-foot{display:block}
  body.sm-expanded .sm-tx{display:inline}
  body.sm-expanded .sm-top{justify-content:flex-start;padding:12px 14px}
  body.sm-expanded .sm-item{justify-content:flex-start;padding:9px 11px}
  .bottom-bar,body.sm-collapsed .bottom-bar{left:64px !important;}
}
</style>
</head>

<script>
(function(){
'use strict';
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
var D=window.TU_DATA||null;
var TELAS=[], SHORT=[], USERS=[], view='matriz', FOLDER='Programa\u00e7\u00e3o';
var SHORTMAP={'Painel Programa\u00e7\u00e3o Obras':'Painel','Relat\u00f3rio Programa\u00e7\u00e3o Obras':'Relat\u00f3rio','Reprograma\u00e7\u00e3o de Obras':'Reprog.','Despachar Obras Equipes':'Desp. Equipes','Retorno Programador':'Retorno','Pr\u00e9-Invent\u00e1rio':'Pr\u00e9-Inv.','Despachar Obras Civis':'Desp. Civis'};

function clock(){var d=new Date();var t=$('page-time');if(t)t.textContent=d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
clock();setInterval(clock,30000);

function shortName(t){return SHORTMAP[t]||t;}

function buildFolderSelect(){
  var sel=$('perm-folder'); if(!sel||!D)return;
  var html='';
  D.indice.forEach(function(it){
    html+='<option value="'+esc(it.p)+'">'+esc(it.p)+' ('+it.nt+' telas \u00b7 '+it.nu+' usu.)</option>';
  });
  sel.innerHTML=html;
  if(!D.pastas[FOLDER]) FOLDER=(D.indice[0]&&D.indice[0].p)||'';
  sel.value=FOLDER;
}

function loadFolder(){
  if(!D||!D.pastas[FOLDER]){TELAS=[];USERS=[];return;}
  var pd=D.pastas[FOLDER];
  TELAS=pd.t||[]; SHORT=TELAS.map(shortName);
  USERS=String(pd.d||'').split('\n').filter(Boolean).map(function(ln){
    var p=ln.split('|'); var uid=p[0];
    var u=(D.users[uid]||['','']);
    var idxs=(p[1]||'').split(',').filter(function(x){return x!=='';}).map(Number);
    return {login:u[0]||'',nome:u[1]||'',cargo:D.cargos[uid]||'',set:idxs};
  });
}

function renderKPIs(){
  var full=USERS.filter(function(u){return u.set.length===TELAS.length;}).length;
  var html='';
  html+='<div class="kpi blue"><div class="v">'+USERS.length+'</div><div class="l">Usu\u00e1rios</div></div>';
  html+='<div class="kpi"><div class="v">'+TELAS.length+'</div><div class="l">Telas</div></div>';
  html+='<div class="kpi green"><div class="v">'+full+'</div><div class="l">Com todas</div></div>';
  html+='<div class="kpi orange"><div class="v">'+(USERS.length-full)+'</div><div class="l">Acesso parcial</div></div>';
  $('perm-kpis').innerHTML=html;
}

function filtered(){
  var q=($('perm-search').value||'').trim().toLowerCase();
  if(!q)return USERS;
  return USERS.filter(function(u){return u.nome.toLowerCase().indexOf(q)>=0||u.login.toLowerCase().indexOf(q)>=0||(u.cargo||'').toLowerCase().indexOf(q)>=0;});
}

window.permSetFolder=function(f){FOLDER=f;loadFolder();renderKPIs();permRender();};
window.permSetView=function(v){
  view=v;
  ['matriz','usuario','tela','arvore','acesso','portela'].forEach(function(x){var b=$('v-'+x);if(b)b.className='fbtn'+(x===v?' active':'');});
  var isTree=(v==='arvore'), isAc=(v==='acesso'), isPt=(v==='portela');
  var fg=$('perm-fg-pasta'); if(fg)fg.style.display=(isTree||isAc||isPt)?'none':'';
  var fga=$('perm-fg-acesso'); if(fga)fga.style.display=isAc?'':'none';
  var fgb=$('perm-fg-busca'); if(fgb)fgb.style.display=(isAc||isPt)?'none':'';
  var ex=$('perm-exp'); if(ex)ex.style.display=(isTree||isAc||isPt)?'none':'';
  var tw=document.querySelector('.twrap'); if(tw)tw.style.display=(isTree||isAc||isPt)?'none':'';
  var tr=$('perm-tree'); if(tr)tr.style.display=isTree?'':'none';
  var wh=$('perm-who'); if(wh)wh.style.display=isAc?'':'none';
  var ut=$('perm-utree'); if(ut)ut.style.display=isAc?'':'none';
  var pt=$('perm-portela'); if(pt)pt.style.display=isPt?'':'none';
  var sb=$('perm-search'); if(sb)sb.placeholder=isTree?'\ud83d\udd0e tela, pasta, usu\u00e1rio ou cargo':'\ud83d\udd0e usu\u00e1rio, login ou cargo';
  if(isTree){renderTreeKPIs();renderTree();}
  else if(isAc){acInit();}
  else if(isPt){ptRender();}
  else{renderKPIs();permRender();}
};

var PT_INDEX=null;
function ptNorm(s){return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();}
function ptBuild(){
  if(PT_INDEX) return PT_INDEX;
  PT_INDEX=[];
  function walk(name, node, path){
    var here=path.concat(name);
    var set={}, ntelas=0;
    if(node.t)Object.keys(node.t).forEach(function(tela){
      var arr=(node.t[tela]||'').split(',').filter(Boolean);
      arr.forEach(function(x){set[x]=1;}); ntelas++;
      PT_INDEX.push({tipo:'tela', nome:tela, path:here.slice(), uids:arr.map(Number)});
    });
    if(node.c)Object.keys(node.c).forEach(function(k){
      var ch=walk(k, node.c[k], here);
      for(var u in ch.set)set[u]=1; ntelas+=ch.ntelas;
    });
    PT_INDEX.push({tipo:'pasta', nome:name, path:path.slice(), uids:Object.keys(set).map(Number), telas:ntelas});
    return {set:set, ntelas:ntelas};
  }
  Object.keys(TREE.tree).forEach(function(m){ walk(m, TREE.tree[m], []); });
  return PT_INDEX;
}
window.ptRender=function(){
  var sb=$('pt-search'); var q=sb?ptNorm(sb.value).trim():'';
  var tipo=$('pt-tipo')?$('pt-tipo').value:'';
  var box=$('pt-results'); if(!box) return;
  if(q.length<2){ box.innerHTML='<div class="empty">Digite ao menos 2 letras do nome de uma tela ou subpasta para ver quem tem acesso.</div>'; return; }
  var idx=ptBuild();
  var hits=idx.filter(function(r){ return (!tipo||r.tipo===tipo) && ptNorm(r.nome).indexOf(q)>=0; });
  hits.sort(function(a,b){
    if(a.tipo!==b.tipo) return a.tipo==='pasta'?-1:1;       // subpastas primeiro
    return a.nome.localeCompare(b.nome,'pt') || b.uids.length-a.uids.length;
  });
  if(!hits.length){ box.innerHTML='<div class="empty">Nada encontrado para \u201c'+esc(q)+'\u201d.</div>'; return; }
  var shown=hits.slice(0,40);
  var incSup = !!($('pt-sup') && $('pt-sup').checked);
  box.innerHTML=shown.map(function(r){
    var uids = incSup ? r.uids : r.uids.filter(function(uid){ var lg=(TREE.users[uid]&&TREE.users[uid][0])||''; return !/^(NW|SV)/i.test(lg); });
    var nSup = r.uids.length - uids.length;
    var users=uids.map(function(uid){
      var u=TREE.users[uid]||['','']; var cg=TREE.cargos[uid]||''; var uf=(TREE.uf&&TREE.uf[uid])||''; var ba=(TREE.base&&TREE.base[uid])||'';
      var loc=uf?(uf+(ba?' \u00b7 '+ba:'')):(ba||'');
      var sup=/^(NW|SV)/i.test(u[0]||'');
      return '<div class="pt-u"><span class="pt-un">'+esc(u[1]||u[0])+'</span>'+(sup?'<span class="pt-sup">\ud83d\udee0\ufe0f suporte</span>':'')+(loc?'<span class="pt-loc">\ud83d\udccd '+esc(loc)+'</span>':'')+(cg?'<span class="pt-cg">'+esc(cg)+'</span>':'')+'<span class="pt-lg">'+esc(u[0])+'</span></div>';
    }).join('') || '<div class="pt-empty">'+(nSup?'Apenas contas de suporte t\u00eam acesso (marque \u201cIncluir suporte\u201d para ver).':'Nenhum usu\u00e1rio com acesso.')+'</div>';
    var isPasta=r.tipo==='pasta';
    var icon=isPasta?'\ud83d\udcc1':'\ud83d\udcc4';
    var pathStr=r.path.join(' \u203a ');
    var telasLbl=isPasta?'<span class="pt-telas">'+r.telas+' tela'+(r.telas!==1?'s':'')+'</span>':'';
    var nlbl=uids.length+' usu\u00e1rio'+(uids.length!==1?'s':'')+(nSup?' <span class="pt-supn">+'+nSup+' suporte</span>':'');
    return '<details class="pt-card'+(isPasta?' pt-pasta':'')+'"'+(shown.length===1?' open':'')+'><summary><span class="pt-tela">'+icon+' '+esc(r.nome)+'</span>'+(pathStr?'<span class="pt-path">'+esc(pathStr)+'</span>':'')+telasLbl+'<span class="pt-n">'+nlbl+'</span></summary><div class="pt-users">'+users+'</div></details>';
  }).join('');
  if(hits.length>shown.length) box.innerHTML+='<div class="empty">+ '+(hits.length-shown.length)+' resultados. Refine a busca.</div>';
};

window.permRender=function(){
  if(view==='arvore'){renderTree();return;}
  var th=$('perm-thead'), tb=$('perm-tbody');
  if(!TELAS.length){th.innerHTML='';tb.innerHTML='<tr><td class="empty">Pasta sem dados.</td></tr>';$('perm-count').textContent='\u2014';return;}
  var list=filtered().slice().sort(function(a,b){return a.nome.toUpperCase()<b.nome.toUpperCase()?-1:1;});
  if(view==='matriz'){
    $('perm-title').textContent='\ud83d\udd10 Matriz \u2014 '+FOLDER;
    var h='<tr><th>Usu\u00e1rio</th><th>Login</th><th>Cargo</th>';
    SHORT.forEach(function(s,i){h+='<th class="c" title="'+esc(TELAS[i])+'">'+esc(s)+'</th>';});
    h+='<th class="c">Total</th></tr>'; th.innerHTML=h;
    var rows=list.map(function(u){
      var tds=''; for(var i=0;i<TELAS.length;i++){tds+='<td class="c">'+(u.set.indexOf(i)>=0?'<span class="ck">\u2713</span>':'<span class="no">\u00b7</span>')+'</td>';}
      return '<tr><td class="nm">'+esc(u.nome)+'</td><td class="lg">'+esc(u.login)+'</td><td class="cg">'+(u.cargo?esc(u.cargo):'<span class="no">\u2014</span>')+'</td>'+tds+'<td class="c tot">'+u.set.length+'</td></tr>';
    }).join('');
    tb.innerHTML=rows||'<tr><td class="empty" colspan="'+(TELAS.length+4)+'">Nenhum usu\u00e1rio.</td></tr>';
    $('perm-count').textContent=list.length+' usu\u00e1rios';
  } else if(view==='usuario'){
    $('perm-title').textContent='\ud83d\udd10 Por usu\u00e1rio \u2014 '+FOLDER;

    .catch(function(e){ onerr(e.message); });
}
window.ptAbrirUpload=function(){
  if(document.getElementById('pt-up-ov'))return;
  var ov=document.createElement('div'); ov.id='pt-up-ov';
  ov.innerHTML='<div id="pt-up-card">'
   +'<div class="pt-up-h"><b>📤 Atualizar permissões</b><button id="pt-up-x">✕</button></div>'
   +'<p class="pt-up-d">Exporte o relatório de permissões do <b>GPM</b> (colunas <b>Tela;Login;Usuario;Pasta</b>) e selecione o arquivo <b>.csv</b>. O sistema recalcula quem acessa cada tela e <b>atualiza para todos</b>.</p>'
   +'<input type="file" id="pt-up-file" accept=".csv,text/csv">'
   +'<div id="pt-up-status" class="pt-up-st"></div>'
   +'<div class="pt-up-acts"><button id="pt-up-pub" disabled>Publicar para todos</button></div>'
   +'</div>';
  if(!document.getElementById('pt-up-css')){ var st=document.createElement('style'); st.id='pt-up-css'; st.textContent=
    '#pt-up-ov{position:fixed;inset:0;z-index:100001;background:rgba(7,40,38,.55);display:flex;align-items:center;justify-content:center;padding:18px;font-family:Barlow,system-ui,sans-serif}'
   +'#pt-up-card{background:#fff;border-radius:16px;max-width:460px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3)}'
   +'.pt-up-h{display:flex;justify-content:space-between;align-items:center;font-size:1.1rem;color:#0f3a33}'
   +'#pt-up-x{border:0;background:#eef2f7;width:30px;height:30px;border-radius:8px;cursor:pointer;font-weight:800;color:#64748b}'
   +'.pt-up-d{font-size:.85rem;color:#475569;line-height:1.45;margin:10px 0 14px}'
   +'#pt-up-file{width:100%;font-size:.9rem;margin-bottom:12px}'
   +'.pt-up-st{font-size:.85rem;font-weight:600;min-height:20px;margin-bottom:12px;line-height:1.5}'
   +'.pt-up-st .ok{color:#276749}.pt-up-st .err{color:#c53030}.pt-up-st .muted{color:#64748b}'
   +'.pt-up-acts{display:flex;justify-content:flex-end}'
   +'#pt-up-pub{padding:11px 20px;border:0;border-radius:10px;background:linear-gradient(90deg,#0d7377,#14a085);color:#fff;font-weight:800;cursor:pointer;font-family:inherit}'
   +'#pt-up-pub:disabled{opacity:.45;cursor:default}';
    document.head.appendChild(st); }
  document.body.appendChild(ov);
  var pend=null;
  function close(){ if(ov.parentNode)ov.parentNode.removeChild(ov); }
  ov.addEventListener('click',function(e){ if(e.target===ov)close(); });
  document.getElementById('pt-up-x').onclick=close;
  document.getElementById('pt-up-file').onchange=function(e){
    var f=e.target.files&&e.target.files[0]; if(!f)return;
    var stEl=document.getElementById('pt-up-status'); stEl.innerHTML='<span class="muted">Processando…</span>';
    document.getElementById('pt-up-pub').disabled=true; pend=null;
    var rd=new FileReader();
    rd.onload=function(){ try{
        var res=ptRebuild(rd.result, TREE); pend=res.tu;
        var s=res.stats;
        stEl.innerHTML='<span class="ok">✓ Arquivo lido.</span><br>'+s.linhas+' linhas · <b>'+s.usuarios+'</b> usuários · <b>'+s.telas+'</b> telas · '+s.atrib+' atribuições'+(s.sem?('<br><span class="muted">'+s.sem+' linha(s) sem pasta correspondente foram para “Novas”.</span>'):'');
        document.getElementById('pt-up-pub').disabled=false;
      }catch(err){ stEl.innerHTML='<span class="err">Erro: '+(err.message||err)+'</span>'; }
    };
    rd.onerror=function(){ stEl.innerHTML='<span class="err">Não foi possível ler o arquivo.</span>'; };
    rd.readAsText(f,'UTF-8');
  };
  document.getElementById('pt-up-pub').onclick=function(){
    if(!pend)return; var stEl=document.getElementById('pt-up-status'); var btn=this;
    btn.disabled=true; stEl.innerHTML='<span class="muted">Publicando…</span>';
    ptSalvar(pend, function(){
      window.TU_TREE=pend; TREE=pend; PT_INDEX=null; window.__ptInfo={updated_at:new Date().toISOString(),updated_by:(window.MARIUA_USER||'')+''};
      stEl.innerHTML='<span class="ok">✓ Publicado! Os dados foram atualizados para todos.</span>';
      try{ renderKPIs&&renderKPIs(); window.permSetView('acesso'); ptMostrarData(); }catch(e){}
      setTimeout(close,1200);
    }, function(msg){ btn.disabled=false; stEl.innerHTML='<span class="err">Erro ao publicar: '+msg+'</span>'; });
  };
};

function init(){
  if(!D){$('perm-tbody').innerHTML='<tr><td class="empty">Dados n\u00e3o carregados (telas_usuarios_data.js).</td></tr>';}
  else{ buildFolderSelect(); loadFolder(); renderKPIs(); permRender(); }
  // tenta carregar a versão atualizada do banco; depois abre a visão Acesso
  ptCarregarRemota(function(){
    try{ if(window.TU_TREE){ TREE=window.TU_TREE; window.permSetView('acesso'); } }catch(e){}
    ptMostrarData();
  });
}
init();
})();
