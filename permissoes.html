*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:#f0f4f5;color:#2d3748;padding-top:92px;padding-bottom:60px;}

.cols{display:grid;grid-template-columns:230px 1fr;gap:18px;align-items:start;margin-bottom:24px;}
.side{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.07);overflow:hidden;position:sticky;top:108px;}

<script>
(function(){
'use strict';
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
var D=window.TU_DATA||null;
var TELAS=[], SHORT=[], USERS=[], view='matriz', FOLDER='Programa\u00e7\u00e3o';
var SHORTMAP={'Painel Programa\u00e7\u00e3o Obras':'Painel','Relat\u00f3rio Programa\u00e7\u00e3o Obras':'Relat\u00f3rio','Reprograma\u00e7\u00e3o de Obras':'Reprog.','Despachar Obras Equipes':'Desp. Equipes','Retorno Programador':'Retorno','Pr\u00e9-Invent\u00e1rio':'Pr\u00e9-Inv.','Despachar Obras Civis':'Desp. Civis'};

function clock(){var d=new Date();var t=$('page-time');if(t)t.textContent=d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
clock();setInterval(clock,30000);

function shortName(t){return SHORTMAP[t]||t;}

function buildFolderSelect(){
  var sel=$('perm-folder'); if(!sel||!D)return;
  var html='';
  D.indice.forEach(function(it){
    html+='<option value="'+esc(it.p)+'">'+esc(it.p)+' ('+it.nt+' telas \u00b7 '+it.nu+' usu.)</option>';
  });
  sel.innerHTML=html;
  if(!D.pastas[FOLDER]) FOLDER=(D.indice[0]&&D.indice[0].p)||'';
  sel.value=FOLDER;
}

function loadFolder(){
  if(!D||!D.pastas[FOLDER]){TELAS=[];USERS=[];return;}
  var pd=D.pastas[FOLDER];
  TELAS=pd.t||[]; SHORT=TELAS.map(shortName);
  USERS=String(pd.d||'').split('\n').filter(Boolean).map(function(ln){
    var p=ln.split('|'); var uid=p[0];
    var u=(D.users[uid]||['','']);
    var idxs=(p[1]||'').split(',').filter(function(x){return x!=='';}).map(Number);
    return {login:u[0]||'',nome:u[1]||'',cargo:D.cargos[uid]||'',set:idxs};
  });
}

function renderKPIs(){
  var full=USERS.filter(function(u){return u.set.length===TELAS.length;}).length;
  var html='';
  html+='<div class="kpi blue"><div class="v">'+USERS.length+'</div><div class="l">Usu\u00e1rios</div></div>';
  html+='<div class="kpi"><div class="v">'+TELAS.length+'</div><div class="l">Telas</div></div>';
  html+='<div class="kpi green"><div class="v">'+full+'</div><div class="l">Com todas</div></div>';
  html+='<div class="kpi orange"><div class="v">'+(USERS.length-full)+'</div><div class="l">Acesso parcial</div></div>';
  $('perm-kpis').innerHTML=html;
}

function filtered(){
  var q=($('perm-search').value||'').trim().toLowerCase();
  if(!q)return USERS;
  return USERS.filter(function(u){return u.nome.toLowerCase().indexOf(q)>=0||u.login.toLowerCase().indexOf(q)>=0||(u.cargo||'').toLowerCase().indexOf(q)>=0;});
}

window.permSetFolder=function(f){FOLDER=f;loadFolder();renderKPIs();permRender();};
window.permSetView=function(v){
  view=v;
  ['matriz','usuario','tela','arvore','acesso'].forEach(function(x){var b=$('v-'+x);if(b)b.className='fbtn'+(x===v?' active':'');});
  var isTree=(v==='arvore'), isAc=(v==='acesso');
  var fg=$('perm-fg-pasta'); if(fg)fg.style.display=(isTree||isAc)?'none':'';
  var fga=$('perm-fg-acesso'); if(fga)fga.style.display=isAc?'':'none';
  var fgb=$('perm-fg-busca'); if(fgb)fgb.style.display=isAc?'none':'';
  var ex=$('perm-exp'); if(ex)ex.style.display=(isTree||isAc)?'none':'';
  var tw=document.querySelector('.twrap'); if(tw)tw.style.display=(isTree||isAc)?'none':'';
  var tr=$('perm-tree'); if(tr)tr.style.display=isTree?'':'none';
  var wh=$('perm-who'); if(wh)wh.style.display=isAc?'':'none';
  var ut=$('perm-utree'); if(ut)ut.style.display=isAc?'':'none';
  var sb=$('perm-search'); if(sb)sb.placeholder=isTree?'\ud83d\udd0e tela, pasta, usu\u00e1rio ou cargo':'\ud83d\udd0e usu\u00e1rio, login ou cargo';
  if(isTree){renderTreeKPIs();renderTree();}
  else if(isAc){acInit();}
  else{renderKPIs();permRender();}
};

window.permRender=function(){

  if(!TELAS.length){th.innerHTML='';tb.innerHTML='<tr><td class="empty">Pasta sem dados.</td></tr>';$('perm-count').textContent='\u2014';return;}
  var list=filtered().slice().sort(function(a,b){return a.nome.toUpperCase()<b.nome.toUpperCase()?-1:1;});
  if(view==='matriz'){
    $('perm-title').textContent='\ud83d\udd10 Matriz \u2014 '+FOLDER;
    var h='<tr><th>Usu\u00e1rio</th><th>Login</th><th>Cargo</th>';
    SHORT.forEach(function(s,i){h+='<th class="c" title="'+esc(TELAS[i])+'">'+esc(s)+'</th>';});
    h+='<th class="c">Total</th></tr>'; th.innerHTML=h;
    var rows=list.map(function(u){
      var tds=''; for(var i=0;i<TELAS.length;i++){tds+='<td class="c">'+(u.set.indexOf(i)>=0?'<span class="ck">\u2713</span>':'<span class="no">\u00b7</span>')+'</td>';}
      return '<tr><td class="nm">'+esc(u.nome)+'</td><td class="lg">'+esc(u.login)+'</td><td class="cg">'+(u.cargo?esc(u.cargo):'<span class="no">\u2014</span>')+'</td>'+tds+'<td class="c tot">'+u.set.length+'</td></tr>';
    }).join('');
    tb.innerHTML=rows||'<tr><td class="empty" colspan="'+(TELAS.length+4)+'">Nenhum usu\u00e1rio.</td></tr>';
    $('perm-count').textContent=list.length+' usu\u00e1rios';
  } else if(view==='usuario'){
    $('perm-title').textContent='\ud83d\udd10 Por usu\u00e1rio \u2014 '+FOLDER;
    th.innerHTML='<tr><th>Usu\u00e1rio</th><th>Login</th><th>Cargo</th><th class="c">Qtd</th><th>Telas</th></tr>';
    var rows=list.map(function(u){
      var tag=u.set.length===TELAS.length?'<span class="badge7">todas</span>':'<span class="badgep">'+u.set.length+'/'+TELAS.length+'</span>';
      var pills=u.set.map(function(i){return '<span class="pill">'+esc(TELAS[i])+'</span>';}).join('');
      return '<tr><td class="nm">'+esc(u.nome)+'</td><td class="lg">'+esc(u.login)+'</td><td class="cg">'+(u.cargo?esc(u.cargo):'<span class="no">\u2014</span>')+'</td><td class="c">'+tag+'</td><td>'+pills+'</td></tr>';
    }).join('');
    tb.innerHTML=rows||'<tr><td class="empty" colspan="5">Nenhum usu\u00e1rio.</td></tr>';
    $('perm-count').textContent=list.length+' usu\u00e1rios';
  } else {
    $('perm-title').textContent='\ud83d\udd10 Por tela \u2014 '+FOLDER;
    th.innerHTML='<tr><th>Tela</th><th class="c">Usu\u00e1rios</th><th>Ades\u00e3o</th></tr>';
    var counts=TELAS.map(function(_,i){return list.filter(function(u){return u.set.indexOf(i)>=0;}).length;});
    var order=TELAS.map(function(t,i){return {t:t,n:counts[i]};}).sort(function(a,b){return b.n-a.n;});
    var tot=list.length||1;
    var rows=order.map(function(o){
      var pc=Math.round(o.n/tot*100);
      return '<tr><td class="nm">'+esc(o.t)+'</td><td class="c tot">'+o.n+'</td><td><span class="bar"><i style="width:'+pc+'%"></i></span> <b>'+pc+'%</b></td></tr>';
    }).join('');
    tb.innerHTML=rows||'<tr><td class="empty" colspan="3">Sem dados.</td></tr>';

};

window.permExport=function(){
  var list=filtered().slice().sort(function(a,b){return a.nome.toUpperCase()<b.nome.toUpperCase()?-1:1;});
  var sep=';', head=['Login','Usuario','Cargo'].concat(TELAS).concat(['Total']);
  var lines=[head.join(sep)];
  list.forEach(function(u){
    var row=[u.login,u.nome,u.cargo];
    for(var i=0;i<TELAS.length;i++)row.push(u.set.indexOf(i)>=0?'Sim':'Nao');
    row.push(u.set.length);
    lines.push(row.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(sep));
  });
  var blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var safe=FOLDER.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'_');
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='telas_usuarios_'+safe+'.csv';a.click();
};

/* ===== Visão Árvore (mãe → sub → tela → usuários) ===== */
var TREE=window.TU_TREE||null;
var _telaSeq=0,_telaStore={},_treeBound=false;

function treeCountTelas(node){
  var c=0;
  if(node.t)c+=Object.keys(node.t).length;
  if(node.c)for(var k in node.c)c+=treeCountTelas(node.c[k]);
  return c;
}
function buildUserList(uids){
  var ids=String(uids||'').split(',').filter(Boolean).map(Number);
  if(!ids.length)return '<div class="tw-empty">Nenhum usu\u00e1rio.</div>';
  var arr=ids.map(function(id){var u=TREE.users[id]||['',''];return {login:u[0]||'',nome:u[1]||'',cargo:TREE.cargos[id]||''};});
  arr.sort(function(a,b){return a.nome.toUpperCase()<b.nome.toUpperCase()?-1:1;});
  return arr.map(function(u){return '<div class="tw-u"><b>'+esc(u.nome)+'</b>'+(u.login?'<span class="tw-lg">'+esc(u.login)+'</span>':'')+(u.cargo?'<span class="tw-cg">'+esc(u.cargo)+'</span>':'')+'</div>';}).join('');
}
function nodeMatches(node,q){
  if(node.t){for(var t in node.t){if(t.toLowerCase().indexOf(q)>=0)return true;
    var ids=String(node.t[t]).split(',');
    for(var i=0;i<ids.length;i++){var id=ids[i];if(!id)continue;var u=TREE.users[id]||['',''];var cg=TREE.cargos[id]||'';
      if((u[0]||'').toLowerCase().indexOf(q)>=0||(u[1]||'').toLowerCase().indexOf(q)>=0||cg.toLowerCase().indexOf(q)>=0)return true;}}}
  if(node.c)for(var k in node.c){if(k.toLowerCase().indexOf(q)>=0)return true;if(nodeMatches(node.c[k],q))return true;}
  return false;
}
function renderNode(name,node,depth,q){
  var nameHit=name.toLowerCase().indexOf(q)>=0;
  var inner='';
  if(node.c){
    Object.keys(node.c).sort(function(a,b){return a.localeCompare(b,'pt');}).forEach(function(k){
      inner+=renderNode(k,node.c[k],depth+1,q);
    });
  }
  if(node.t){
    Object.keys(node.t).sort(function(a,b){return a.localeCompare(b,'pt');}).forEach(function(t){
      var uids=node.t[t];
      if(q && !nameHit){
        var hit=t.toLowerCase().indexOf(q)>=0;
        if(!hit){var ids=String(uids).split(',');for(var i=0;i<ids.length&&!hit;i++){var id=ids[i];if(!id)continue;var u=TREE.users[id]||['',''];var cg=TREE.cargos[id]||'';if((u[0]||'').toLowerCase().indexOf(q)>=0||(u[1]||'').toLowerCase().indexOf(q)>=0||cg.toLowerCase().indexOf(q)>=0)hit=true;}}
        if(!hit)return;
      }
      var nU=String(uids||'').split(',').filter(Boolean).length;
      var sid='tl'+(_telaSeq++); _telaStore[sid]=uids;
      inner+='<details class="tw-tela"'+(q?' open':'')+'><summary><span class="tw-ic">\ud83d\udcc4</span>'+esc(t)+'<span class="tw-n">'+nU+'</span></summary><div class="tw-users" data-sid="'+sid+'" data-loaded="0"></div></details>';
    });
  }
  if(q && !nameHit && !inner)return '';
  var icon=depth===1?'\ud83d\udcc1':'\ud83d\udcc2';
  return '<details class="tw-folder tw-d'+depth+'"'+(q?' open':'')+'><summary><span class="tw-ic">'+icon+'</span>'+esc(name)+'<span class="tw-n">'+treeCountTelas(node)+' telas</span></summary><div class="tw-children">'+inner+'</div></details>';
}
function renderTreeKPIs(){
  if(!TREE)return;
  var maes=Object.keys(TREE.tree).length, telas=0;
  for(var m in TREE.tree)telas+=treeCountTelas(TREE.tree[m]);
  var h='';
  h+='<div class="kpi blue"><div class="v">'+maes+'</div><div class="l">M\u00f3dulos</div></div>';
  h+='<div class="kpi"><div class="v">'+telas+'</div><div class="l">Telas</div></div>';
  h+='<div class="kpi green"><div class="v">'+TREE.users.length+'</div><div class="l">Usu\u00e1rios</div></div>';
  h+='<div class="kpi orange"><div class="v">'+Object.keys(TREE.cargos).length+'</div><div class="l">Cargos</div></div>';
  $('perm-kpis').innerHTML=h;
}
window.renderTree=function(){
  var box=$('perm-tree'); if(!box)return;
  if(!TREE){box.innerHTML='<div class="empty">\u00c1rvore n\u00e3o carregada (telas_usuarios_arvore.js).</div>';$('perm-count').textContent='\u2014';$('perm-title').textContent='\ud83c\udf33 \u00c1rvore de permiss\u00f5es';return;}
  $('perm-title').textContent='\ud83c\udf33 \u00c1rvore de permiss\u00f5es \u2014 todas as pastas';
  var q=($('perm-search').value||'').trim().toLowerCase();
  _telaSeq=0; _telaStore={};
  var maes=Object.keys(TREE.tree).sort(function(a,b){
    if(a.charAt(0)==='(')return 1; if(b.charAt(0)==='(')return -1;
    return a.localeCompare(b,'pt');
  });
  var html='';
  maes.forEach(function(m){html+=renderNode(m,TREE.tree[m],1,q);});
  box.innerHTML=html||'<div class="empty">Nada encontrado.</div>';
  $('perm-count').textContent=(q?'busca: ':'')+ _telaSeq +' telas';
  if(q){
    box.querySelectorAll('.tw-tela[open] .tw-users[data-loaded="0"]').forEach(function(u){
      u.innerHTML=buildUserList(_telaStore[u.getAttribute('data-sid')]); u.setAttribute('data-loaded','1');
    });
  }
  if(!_treeBound){
    _treeBound=true;
    box.addEventListener('toggle',function(e){
      var d=e.target;
      if(d.classList&&d.classList.contains('tw-tela')&&d.open){
        var u=d.querySelector('.tw-users');
        if(u&&u.getAttribute('data-loaded')==='0'){u.innerHTML=buildUserList(_telaStore[u.getAttribute('data-sid')]);u.setAttribute('data-loaded','1');}
      }
    },true);
  }
};


/* ===== Visão Acesso (por usuário: UF -> Função -> Usuário) ===== */
var AC_SEMF='(sem fun\u00e7\u00e3o)', AC_SEMUF='(sem UF)';
function acUfunc(i){return (TREE&&TREE.cargos[i])||AC_SEMF;}
function acUuf(i){return (TREE&&TREE.uf&&TREE.uf[i])||AC_SEMUF;}
function acFillUF(){
  var c={}; TREE.users.forEach(function(u,i){var f=acUuf(i);c[f]=(c[f]||0)+1;});
  var ks=Object.keys(c).sort(function(a,b){if(a===AC_SEMUF)return 1;if(b===AC_SEMUF)return -1;return a.localeCompare(b);});
  $('ac-uf').innerHTML='<option value="">Todos ('+TREE.users.length+')</option>'+ks.map(function(f){return '<option value="'+esc(f)+'">'+esc(f)+' ('+c[f]+')</option>';}).join('');
}
function acFillFuncs(){
  var uf=$('ac-uf').value, c={};
  TREE.users.forEach(function(u,i){if(uf&&acUuf(i)!==uf)return;var f=acUfunc(i);c[f]=(c[f]||0)+1;});
  var ks=Object.keys(c).sort(function(a,b){if(a===AC_SEMF)return 1;if(b===AC_SEMF)return -1;return a.localeCompare(b,'pt');});
  var tot=0; for(var k in c)tot+=c[k];
  $('ac-func').innerHTML='<option value="">Todas as fun\u00e7\u00f5es ('+tot+')</option>'+ks.map(function(f){return '<option value="'+esc(f)+'">'+esc(f)+' ('+c[f]+')</option>';}).join('');
}
function acFillUsers(){
  var uf=$('ac-uf').value, f=$('ac-func').value;
  var order=TREE.users.map(function(u,i){return {i:i,nome:u[1]||u[0]||('#'+i),login:u[0]||'',f:acUfunc(i),uf:acUuf(i)};})
    .filter(function(o){return (!uf||o.uf===uf)&&(!f||o.f===f);})
    .sort(function(a,b){return a.nome.toUpperCase()<b.nome.toUpperCase()?-1:1;});
  $('ac-user').innerHTML=order.length?order.map(function(o){return '<option value="'+o.i+'">'+esc(o.nome)+(o.login?' \u2014 '+esc(o.login):'')+'</option>';}).join(''):'<option value="">(nenhum)</option>';
}
function acCntU(n,uid){var c=0;if(n.t)for(var t in n.t){if((','+n.t[t]+',').indexOf(','+uid+',')>=0)c++;}if(n.c)for(var k in n.c)c+=acCntU(n.c[k],uid);return c;}
function acNodeU(name,n,d,uid){
  var inner='';
  if(n.c)Object.keys(n.c).sort(function(a,b){return a.localeCompare(b,'pt');}).forEach(function(k){inner+=acNodeU(k,n.c[k],d+1,uid);});
  if(n.t)Object.keys(n.t).sort(function(a,b){return a.localeCompare(b,'pt');}).forEach(function(t){
    if((','+n.t[t]+',').indexOf(','+uid+',')<0)return;
    inner+='<div class="tw-tela"><span class="tw-ic">\ud83d\udcc4</span>'+esc(t)+'</div>';});
  if(!inner)return '';
  var ic=d===1?'\ud83d\udcc1':'\ud83d\udcc2';
  return '<details class="tw-folder tw-d'+d+'" open><summary><span class="tw-ic">'+ic+'</span>'+esc(name)+'<span class="tw-n">'+acCntU(n,uid)+' telas</span></summary><div class="tw-children">'+inner+'</div></details>';
}
window.acOnTop=function(){acFillFuncs();acFillUsers();acRender();};
window.acRender=function(){
  if(!TREE){$('perm-utree').innerHTML='<div class="empty">\u00c1rvore n\u00e3o carregada.</div>';return;}
  $('perm-title').textContent='\ud83d\udc64 Acesso por usu\u00e1rio';
  var v=$('ac-user').value;
  if(!v){$('perm-who').innerHTML='';$('perm-utree').innerHTML='<div class="empty">Nenhum usu\u00e1rio com esses filtros.</div>';$('perm-count').textContent='\u2014';return;}
  var uid=+v, u=TREE.users[uid]||['',''], cg=TREE.cargos[uid]||'', uf=(TREE.uf&&TREE.uf[uid])||'';
  var ms=Object.keys(TREE.tree).sort(function(a,b){if(a.charAt(0)==='(')return 1;if(b.charAt(0)==='(')return -1;return a.localeCompare(b,'pt');});
  var h='',tot=0,nmod=0;
  ms.forEach(function(m){var part=acNodeU(m,TREE.tree[m],1,uid);if(part){h+=part;nmod++;}tot+=acCntU(TREE.tree[m],uid);});
  $('perm-who').innerHTML='<div class="nm">'+esc(u[1]||u[0])+(uf?'<span class="uf">\ud83d\udccd '+esc(uf)+'</span>':'')+(cg?'<span class="cg">'+esc(cg)+'</span>':'')+'</div><div class="meta">login: <b>'+esc(u[0])+'</b> \u00b7 acesso a <b>'+tot+'</b> telas em <b>'+nmod+'</b> m\u00f3dulos</div>';
  $('perm-utree').innerHTML=h||'<div class="empty">Sem acesso registrado.</div>';
  $('perm-count').textContent=tot+' telas';
}; 
var _acInit=false;
function acInit(){
  if(!TREE){$('perm-utree').innerHTML='<div class="empty">\u00c1rvore n\u00e3o carregada (telas_usuarios_arvore.js).</div>';return;}
  if(!_acInit){_acInit=true;acFillUF();acFillFuncs();acFillUsers();}
  acRender();
}


function init(){
  if(!D){$('perm-tbody').innerHTML='<tr><td class="empty">Dados n\u00e3o carregados (telas_usuarios_data.js).</td></tr>';return;}
  buildFolderSelect();
  loadFolder();
  renderKPIs();
  permRender();
}
init();
})();
