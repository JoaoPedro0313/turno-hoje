.wrapper{
  position:relative;z-index:1;
  width:100%;max-width:480px;
  display:flex;flex-direction:column;align-items:center;
}

/* Logo */
.logo{
  text-align:center;margin-bottom:12px;
  animation:fadeUp .7s ease both;
}

/* Subtitle */
.subtitle{
  font-size:.62rem;font-weight:700;letter-spacing:.35em;text-transform:uppercase;
  color:rgba(255,255,255,.35);margin-bottom:30px;
  animation:fadeUp .7s ease .1s both;
}

/* Grid 2 colunas */
.grid{
  width:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.span2{grid-column:span 2;}

/* Card */
.card{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;
  text-decoration:none;
  padding:28px 14px 22px;
  border-radius:10px;
  background:rgba(255,255,255,.10);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.15);
  transition:all .22s ease;
  animation:fadeUp .5s ease both;
  min-height:120px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
}
.card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;
  height:3px;
  background:var(--teal);
  transition:height .2s, opacity .2s;
  opacity:.7;
}
.card.amber::before{background:#f59e0b;}
.card.orange::before{background:var(--orange);}
.card.sky::before{background:#38bdf8;}
.card.violet::before{background:#a78bfa;}

.card:hover{
  transform:translateY(-6px) scale(1.03);
  box-shadow:0 20px 52px rgba(0,0,0,.45);
  background:rgba(255,255,255,.18);
  border-color:rgba(255,255,255,.28);
}
.card:hover::before{height:4px;opacity:1;}
.card:active{transform:scale(.97);}

.card-emoji{
  font-size:2.2rem;line-height:1;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.3));
  transition:transform .22s ease;
}
.card:hover .card-emoji{transform:scale(1.18) translateY(-2px);}

.card-label{
  font-size:.73rem;font-weight:800;
  letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.9);
  text-align:center;line-height:1.35;
}

/* Footer */
.footer{margin-top:28px;text-align:center;animation:fadeUp .5s ease both;animation-delay:.6s;}
.footer span{font-size:.58rem;letter-spacing:.2em;color:rgba(255,255,255,.2);text-transform:uppercase;}

.d1{animation-delay:.05s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}
.d4{animation-delay:.24s}.d5{animation-delay:.30s}.d6{animation-delay:.36s}
.card.green::before{background:#16a34a;}
</style>
</head>
